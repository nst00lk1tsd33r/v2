<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NS Toolkit Access</title>
<link rel="icon" type="image/jpg" href="https://i.imgur.com/7xDufQI.jpeg">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial; }

/* Dark background */
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0d0d0d;
  overflow: hidden;
  position: relative;
}

/* Canvas for particles */
#particles {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* Login box */
.login-box {
  position: relative;
  z-index: 1; /* above particles */
  width: 360px; 
  padding: 40px; 
  background: #1b1b1b; 
  border-radius: 15px;
  text-align: center; 
  box-shadow: 0 0 25px rgba(0,255,255,0.3);
}

.login-box h2{
  color: #00ffff; 
  margin-bottom: 25px; 
  text-shadow: 0 0 10px #00ffff;
}

.login-box input{
  width: 100%; 
  padding: 12px; 
  border-radius: 6px; 
  border: none; 
  margin-bottom: 20px; 
  font-size: 14px;
}

.login-box button{
  width: 100%; 
  padding: 12px; 
  border: none; 
  border-radius: 6px; 
  background: #19d3d3;
  color: #000; 
  font-weight: bold; 
  cursor: pointer; 
  font-size: 15px; 
  transition: 0.2s;
}

.login-box button:hover{ background:#12bcbc; }
.login-box button:disabled{ opacity:0.5; cursor:not-allowed; }

#status{
  margin-top:12px; 
  font-weight:bold; 
  display:block; 
  min-height:24px;
  font-family: 'Courier New', monospace; 
  font-size:14px; 
  text-align:center;
}

.success{ color:#00ff9c; text-shadow: 0 0 6px #00ff9c; }
.error{ color:#ff4d4d; text-shadow: 0 0 6px #ff4d4d; }

.slack-contact{
  margin-top:15px; 
  font-size:13px; 
  color:#00ffff; 
  text-shadow: 0 0 4px #00ffff;
  text-align:center; 
}

.slack-contact a{
  color:#00ffff; 
  text-decoration:underline;
}

.slack-contact span{
  white-space: nowrap; 
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="login-box">
  <h2>NS Toolkit Access</h2>

  <input type="password" id="password" placeholder="Enter Access Code" onkeypress="if(event.key==='Enter') login()">
  <button id="loginBtn" onclick="login()">Enter</button>
  <p id="status"></p>

  <p class="slack-contact">
    Contact us on Slack: 
    <span>
      Darel Miranda | Morvan Hsu
    </span>
  </p>
</div>

<script>
// Particle animation
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];
const PARTICLE_COUNT = 80;

class Particle {
  constructor(){
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 3 + 1;
    this.speedY = Math.random() * 1 + 0.5;
    this.color = 'rgba(0,255,255,0.5)';
  }
  update(){
    this.y += this.speedY;
    if(this.y > canvas.height){
      this.y = 0;
      this.x = Math.random() * canvas.width;
    }
  }
  draw(){
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();
  }
}

function initParticles(){
  particlesArray = [];
  for(let i=0;i<PARTICLE_COUNT;i++){
    particlesArray.push(new Particle());
  }
}

function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particlesArray.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}

window.addEventListener('resize',()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  initParticles();
});

initParticles();
animateParticles();
</script>
<script>
document.addEventListener("keydown", function(e) {
  // Block F12 and common shortcuts (Ctrl+Shift+I/J, Ctrl+U)
  if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
    e.preventDefault();
    return false;
  }
});

document.addEventListener("keydown", function(e) {
  if (e.ctrlKey && e.shiftKey && e.key === "C") {
    e.preventDefault();
  }
});
// Optional: Disable right-click
document.addEventListener("contextmenu", e => e.preventDefault());
</script
</body>
</html>
