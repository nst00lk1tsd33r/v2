<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>NS Toolkits v3</title>
    <link rel="icon" type="image/jpg" href="https://i.imgur.com/QWLMgK8.jpeg">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root {
            --bg: #0b0b0b;
            --accent: #f6c90e;
            --text: #fff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1a1a1a 0%, #0b0b0b 60%);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            overflow-x: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* NAVBAR */
        .navbar {
            width: 100%;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(246, 201, 14, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-left h1 { margin: 0; font-size: 20px; color: var(--accent); letter-spacing: 1px; }

        .nav-menu {
            display: flex;
            gap: 28px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-menu a {
            color: #e6e6e6;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.8;
            transition: 0.3s;
        }

        .nav-menu a:hover, .nav-menu a.active { color: var(--accent); opacity: 1; }

        @media(max-width:768px){
            .nav-menu{ display:none; }
        }

        /* CONTAINER */
        .container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box; 
            flex: 1 0 auto; 
        }

        /* HERO */
        .hero-title {
            font-size: 52px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ffffff, #f6c90e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(246,201,14,0.6));
            animation: glowPulse 2.5s ease-in-out infinite;
        }

        .hero-sub {
            text-align: center;
            opacity: 0.7;
            font-style: italic;
            max-width: 600px;
            line-height: 1.6;
        }

        /* LOADER */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #080808;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .gold-ring {
            width: 50px;
            height: 50px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-top: 2px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s infinite cubic-bezier(0.6, 0.2, 0.4, 0.8);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
        }

        .loader-text {
            margin-top: 30px;
            color: #d4af37;
            font-size: 9px;
            letter-spacing: 8px;
            font-weight: 300;
            opacity: 0.7;
        }

        .progress-container {
            margin-top: 20px;
            width: 150px;
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: #d4af37;
            animation: grow 3.5s forwards linear;
        }

        /* FOOTER */
        footer {
            width: 100%;
            padding: 20px 0;
            opacity: .5;
            text-align: center;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
        }

        /* ANIMATIONS */
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes grow { to { width: 100%; } }
        @keyframes glowPulse {
            0% { text-shadow: 0 0 5px rgba(246,201,14,0.4), 0 0 10px rgba(246,201,14,0.3), 0 0 20px rgba(246,201,14,0.2); }
            50% { text-shadow: 0 0 10px rgba(246,201,14,0.9), 0 0 25px rgba(246,201,14,0.7), 0 0 45px rgba(246,201,14,0.5); }
            100% { text-shadow: 0 0 5px rgba(246,201,14,0.4), 0 0 10px rgba(246,201,14,0.3), 0 0 20px rgba(246,201,14,0.2); }
        }
        
        /* Utility to fade in main content smoothly once loader is gone */
        .content-reveal {
            animation: fadeInScale 1s ease-out forwards;
        }
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* SUPPORT BUTTON */
        .support-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #f6c90e, #d4a800);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            transition: 0.3s;
            cursor: pointer;
        }

        .support-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 20px rgba(246, 201, 14, 0.6);
        }

        .support-btn svg {
            width: 32px;
            height: 32px;
            fill: #111; /* Dark icon to contrast the gold button */
            transition: 0.3s;
        }

        .support-btn:hover svg {
            transform: scale(1.1);
        }

        /* CAROUSEL */
        .carousel-container {
            perspective: 1800px;
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            width: 100%;
            gap: 40px;
            min-height: 450px; /* Prevents button jump when switching views */
        }

        .carousel {
            width: 360px;
            height: 220px;
            position: relative;
            transform-style: preserve-3d;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
        }

        .carousel:active {
            cursor: grabbing;
        }

        /* CARD */
        .card {
            position: absolute;
            width: 260px;
            height: 180px;
            border-radius: 20px;
            background: rgba(50, 50, 50, 0.95);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: box-shadow 0.3s, border 0.3s; 
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            animation: condenseCarousel 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
        }

        @keyframes condenseCarousel {
            /* Starts clustered tightly at the center and expands to Alpine's inline inline coordinates */
            0% { opacity: 0; transform: rotateY(0deg) translateZ(0px) scale(0.1); }
        }

        .card a {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .icon {
            width: 53px;
            height: 53px;
            margin-bottom: 5px; 
            transform: scale(0.83) translateZ(0); 
            transition: transform 0.3s ease, filter 0.3s ease;
            filter: drop-shadow(0 0 8px rgba(246,201,14,0.6));
            backface-visibility: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .card h3 { color: var(--accent); margin: 5px 0; font-size: 16px; }
        .card span { font-size: 13px; opacity: .7; }
        .card.active { border: 1px solid rgba(246, 201, 14, 0.4); }
        .card:hover .icon { transform: scale(1) translateZ(0); filter: drop-shadow(0 0 14px rgba(246,201,14,1)); }

        /* CONTROLS */
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .controls button {
            background: linear-gradient(135deg, #f6c90e, #d4a800);
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            transition: 0.3s;
            padding: 0;
        }

        .controls button:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 6px 20px rgba(246, 201, 14, 0.6); 
        }

        .controls button svg {
            width: 26px;
            height: 26px;
            fill: #111;
            transition: 0.3s;
        }

        .controls button:hover svg {
            transform: scale(1.15);
        }

        button {
            background: linear-gradient(135deg, #f6c90e, #d4a800);
            border: none;
            padding: 10px 16px;
            border-radius: 20px;
            cursor: pointer;
            color: #111;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            transition: 0.3s;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(246, 201, 14, 0.4); }

        /* GRID FIXES & SCATTER ANIMATION */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 240px);
            justify-content: center; /* Forces identical horizontal/vertical gap layout */
            gap: 25px;
            margin-top: 10px;
            width: 100%;
            max-width: 950px;
        }

        .grid-card {
            width: 240px;
            height: 165px;
            border-radius: 15px;
            background: rgba(50, 50, 50, 0.95);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: box-shadow 0.3s, border 0.3s, transform 0.3s;
            animation: scatterCards 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
        }

        @keyframes scatterCards {
            0% { opacity: 0; transform: scale(0.3) translate(0, -150px) rotate(-15deg); }
            100% { opacity: 1; transform: scale(1) translate(0, 0) rotate(0); }
        }

        .grid-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(246, 201, 14, 0.4); }
        .grid-card a { text-decoration: none; color: inherit; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100%; }
        .grid-card .icon { width: 40px; height: 40px; margin-bottom: 5px; transition: transform 0.3s ease, filter 0.3s ease; filter: drop-shadow(0 0 5px rgba(246,201,14,0.6)); }
        .grid-card:hover .icon { transform: scale(1.1); filter: drop-shadow(0 0 10px rgba(246,201,14,1)); }
        .grid-card h3 { color: var(--accent); margin: 5px 0; font-size: 14px; }
        .grid-card span { font-size: 12px; opacity: .7; }

        @media(max-width: 768px) { .grid-container { grid-template-columns: repeat(2, 240px); } }
        @media(max-width: 480px) { .grid-container { grid-template-columns: 240px; } }

    </style>
</head>

    <script>
        document.addEventListener('alpine:init', () => {
            
            // APP GLOBAL STATE (Handles Loader & Particles)
            Alpine.data('toolkitApp', () => ({
                isLoaded: false,
                init() {
                    this.handleLoading();
                    this.initParticles();
                },
                handleLoading() {
                    const lastLoad = localStorage.getItem("ns_v3_load_time");
                    const now = Date.now();
                    const ONE_HOUR = 3600000;

                    if (!lastLoad || (now - lastLoad) > ONE_HOUR) {
                        setTimeout(() => {
                            this.isLoaded = true;
                            localStorage.setItem("ns_v3_load_time", now);
                        }, 3500);
                    } else {
                        this.isLoaded = true;
                    }
                },
                initParticles() {
                    // Ensures the canvas is ready once the DOM renders
                    this.$nextTick(() => {
                        const canvas = document.getElementById("bg");
                        const ctx = canvas.getContext("2d");
                        let particles = [];

                        const resize = () => {
                            canvas.width = window.innerWidth;
                            canvas.height = window.innerHeight;
                        };
                        resize();
                        window.addEventListener("resize", resize);

                        for (let i = 0; i < 80; i++) {
                            particles.push({
                                x: Math.random() * canvas.width,
                                y: Math.random() * canvas.height,
                                r: Math.random() * 2,
                                dx: Math.random() - .5,
                                dy: Math.random() - .5
                            });
                        }

                        const animate = () => {
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                            particles.forEach(p => {
                                p.x += p.dx;
                                p.y += p.dy;
                                if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
                                if (p.y < 0 || p.y > canvas.height) p.dy *= -1;

                                ctx.beginPath();
                                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                                ctx.fillStyle = "rgba(255,255,255,0.5)";
                                ctx.fill();
                            });
                            requestAnimationFrame(animate);
                        };
                        animate();
                    });
                }
            }));

            // 3D CAROUSEL STATE & PHYSICS
            Alpine.data('carouselApp', () => ({
                viewMode: 'carousel',
                
                init() {
                    const savedMode = localStorage.getItem('ns_v3_view_mode');
                    if (savedMode) {
                        this.viewMode = savedMode;
                    }
                },
                
                toggleViewMode() {
                    this.viewMode = this.viewMode === 'carousel' ? 'grid' : 'carousel';
                    localStorage.setItem('ns_v3_view_mode', this.viewMode);
                },

                current: 0,
                isDragging: false,
                dragDistance: 0, 
                lastX: 0,
                velocity: 0,
                animationFrame: null,
                radius: 320,
                friction: 0.92,
                sensitivity: 0.004,

                cards: [
                    { title: 'Template Writer', type: 'Advanced', icon: 'https://i.imgur.com/U0d0Tx9.png', url: 'tools/templatewriter.html' },
                    { title: 'Template Writer', type: 'Lite', icon: 'https://i.imgur.com/RTJon1q.png', url: 'tools/templatewriterv2.html' },
                    { title: 'Excellence Extractor', type: 'Cleaner', icon: 'https://i.imgur.com/kAY5lXj.png', url: 'tools/excellenceextractor.html' },
                    { title: 'CaseFlip', type: 'Converter', icon: 'https://img.icons8.com/ios7/1200/sentence-case.jpg', url: 'tools/caseflip.html' },
                    { title: 'EaseApp', type: 'Summary Maker', icon: 'https://cdn-icons-png.flaticon.com/512/17806/17806095.png', url: 'tools/easeapp.html' },
                    { title: 'Link Batch Opener', type: 'Paste and Open All Links', icon: 'https://i.imgur.com/UqNxx4u.png', url: 'openall.html' },
                    { title: 'S&I Toolkit', type: 'Profile Finder Tool', icon: 'https://png.pngtree.com/png-vector/20250307/ourmid/pngtree-search-icon-png-image_15738214.png', url: 'tools/search&identify.html' }
                ],

                get theta() {
                    return 360 / this.cards.length;
                },
            
                animateTo(target) {
                    cancelAnimationFrame(this.animationFrame);
                    const ease = () => {
                        let diff = target - this.current;
                        if (Math.abs(diff) < 0.001) {
                            this.current = target;
                            return;
                        }
                        this.current += diff * 0.08;
                        this.animationFrame = requestAnimationFrame(ease);
                    };
                    ease();
                },
            
                rotate(dir) {
                    let directionToMove = -dir; 
                    let target = Math.round(this.current) + directionToMove;
                    this.animateTo(target);
                },
            
                isActive(index) {
                    let normalized = Math.round((index + this.current) % this.cards.length);
                    if (normalized < 0) normalized += this.cards.length;
                    return normalized === 0 || normalized === this.cards.length;
                },
            
                getCardStyle(index) {
                    let angle = this.theta * (index + this.current);
                    let scale = this.isActive(index) ? 1.15 : 1;
                    let shadow = this.isActive(index) ? '0 0 50px rgba(246,201,14,0.9)' : '0 10px 40px rgba(0,0,0,.6)';

                    return `
                        transform: rotateY(${angle}deg) translateZ(${this.radius}px) scale(${scale});
                        box-shadow: ${shadow};
                    `;
                },
            
                startDrag(e) {
                    this.isDragging = true;
                    this.dragDistance = 0; 
                    this.lastX = e.clientX || e.touches[0].clientX;
                    this.velocity = 0;
                    cancelAnimationFrame(this.animationFrame);
                },
            
                onDrag(e) {
                    if (!this.isDragging) return;
                    let currentX = e.clientX || (e.touches ? e.touches[0].clientX : this.lastX);
                    let delta = currentX - this.lastX;

                    this.dragDistance += Math.abs(delta); 
                    this.velocity = delta;
                    this.current += delta * this.sensitivity;
                    this.lastX = currentX;
                },
            
                endDrag() {
                    if (!this.isDragging) return;
                    this.isDragging = false;
                    this.momentum();
                },
            
                handleClick(e) {
                    if (this.dragDistance > 5) {
                        e.preventDefault();
                    }
                },
            
                momentum() {
                    if (Math.abs(this.velocity) < 0.5) {
                        this.snapToNearest();
                        return;
                    }
                    this.current += this.velocity * this.sensitivity;
                    this.velocity *= this.friction;
                    this.animationFrame = requestAnimationFrame(() => this.momentum());
                },
            
                snapToNearest() {
                    let snapped = Math.round(this.current);
                    this.animateTo(snapped);
                }
            }));
        });
    </script>
