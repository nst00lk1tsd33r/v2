<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NS Excellence Extractor | v3</title>
    <link rel="icon" type="image/jpg" href="https://i.imgur.com/QWLMgK8.jpeg">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="excellenceextractorstyle.css">
    
    <!-- QuillJS CSS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <!-- AlpineJS -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        /* Ensure the Quill editor has a physical height to click inside */
        #quill-editor {
            min-height: 400px;
            height: 100%;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        /* Remove Quill's default border since your container already handles it */
        .ql-container.ql-snow {
            border: none !important;
        }
    </style>
</head>

<body 
    x-data="{
        quill: null,
        showPreviews: false,
        networks: ['Facebook', 'Instagram', 'Twitter', 'Youtube', 'LinkedIn', 'Tiktok', 'Pinterest', 'Strava', 'Foursquare', 'Tumblr', 'Google', 'RocketReach', 'SignalHire'],
        startIndex: 0,
        
        // Storage for the 13 cleaned columns
        networkData: {},
        _rawPastedTable: null,
        
        init() {
            this.quill = new Quill('#quill-editor', {
                theme: 'snow',
                placeholder: 'Paste your search string spreadsheet data here...',
                modules: {
                    toolbar: false,
                    clipboard: { matchVisual: false }
                }
            });

            // Initialize empty data map
            this.networks.forEach(net => this.networkData[net] = '<p>No data found.</p>');

            // THE PASTE SHIELD: Intercept paste to save the raw table structure
            this.quill.root.addEventListener('paste', (e) => {
                const rawHTML = e.clipboardData.getData('text/html');
                if (!rawHTML) return; // If plain text, let Quill handle it normally

                e.preventDefault();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(rawHTML, 'text/html');
                const table = doc.querySelector('table');

                if (table) {
                    this._rawPastedTable = table;
                    this.quill.setText('\nSpreadsheet data loaded successfully!\n\nDetected a table with multiple columns. Click Clean Up to process and separate the data into the 13 networks.');
                } else {
                    // Fallback if it's HTML but not a table
                    this.quill.clipboard.dangerouslyPasteHTML(0, doc.body.innerHTML);
                    this._rawPastedTable = null;
                }
            }, true);
        },
        
        cleanText() {
            if (!this._rawPastedTable) {
                alert('Please paste a spreadsheet with columns first.');
                return;
            }

            // 1. Reset our data map completely
            this.networks.forEach(net => this.networkData[net] = '<p>No data found.</p>');

            const rows = this._rawPastedTable.querySelectorAll('tr');
            if (rows.length === 0) return;

            // 2. DYNAMIC HEADER DETECTION: Scan the first 5 rows to find the true header row
            let headerRowIndex = -1;
            let maxMatches = 0;
            let columnIndexToNetworkMap = {};

            for (let r = 0; r < Math.min(rows.length, 5); r++) {
                let currentMatches = 0;
                let currentMap = {};
                const headerCells = rows[r].querySelectorAll('td, th');
                
                headerCells.forEach((cell, cellIndex) => {
                    let cellText = cell.textContent.trim().toLowerCase();
                    
                    if (cellText.includes('lindkedin')) {
                        cellText = cellText.replace('lindkedin', 'linkedin');
                    }

                    // Forgiving match: checks if the cell contains the network name instead of a strict match
                    const matchedNetwork = this.networks.find(net => cellText.includes(net.toLowerCase()));
                    
                    if (matchedNetwork) {
                        currentMatches++;
                        currentMap[cellIndex] = matchedNetwork;
                    }
                });

                // If this row has the most network name matches, it's our header row
                if (currentMatches > maxMatches) {
                    maxMatches = currentMatches;
                    headerRowIndex = r;
                    columnIndexToNetworkMap = currentMap;
                }
            }

            if (maxMatches === 0) {
                alert('Could not detect social media header row. Please ensure column headers like Facebook or LinkedIn are included in your selection.');
                return;
            }

            // 3. Initialize dynamic temporary buckets for detected networks
            let buckets = {};
            this.networks.forEach(net => buckets[net] = []);

            // 4. Extract data rows starting right after the detected header row
            for (let i = headerRowIndex + 1; i < rows.length; i++) {
                const cells = rows[i].querySelectorAll('td, th');
                cells.forEach((cell, cellIndex) => {
                    const assignedNetwork = columnIndexToNetworkMap[cellIndex];
                    
                    // If this column maps to one of our networks, extract it
                    if (assignedNetwork) {
                        const cleanedHTML = this.extractAndCleanLinks(cell);
                        if (cleanedHTML) {
                            buckets[assignedNetwork].push(cleanedHTML);
                        }
                    }
                });
            }

            // 5. Package up the data with prefix/suffix rules
            this.networks.forEach((network) => {
                const linkCount = buckets[network].length;
                
                if (linkCount === 0) {
                    this.networkData[network] = '<p>No data found.</p>';
                    return;
                }

                let prefix = '';
                let suffix = '';

                // Reduced the suffix to a single &nbsp; block to account for the auto-newline on paste
                if (linkCount >= 2) {
                    prefix = '<p>No match found. Please see search queries below.</p><p>&nbsp;</p>';
                    suffix = '<p>&nbsp;</p><p>&nbsp;</p>';
                } else if (linkCount === 1) {
                    prefix = '<p>No match found. Please see search query below.</p><p>&nbsp;</p>';
                    suffix = '<p>&nbsp;</p><p>&nbsp;</p>';
                }

                this.networkData[network] = prefix + buckets[network].join('') + suffix;
            });

            // Slide up full-screen preview pane
            this.showPreviews = true;
        },

        // CORE CLEANUP LOGIC: Strictly extracts URLs/Links and discards noise/duplicates
        extractAndCleanLinks(node) {
            let extractedLinks = [];

            // Helper to process standard plain-text URLs
            const processTextForUrls = (text) => {
                const urlRegex = /((?:https?:\/\/|www\.)[^\s<]+|\b[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}(?:\/[^\s<]*)?)/gi;
                let match;
                while ((match = urlRegex.exec(text)) !== null) {
                    
                    // THE FIX: Prevent the regex from grabbing the domain out of an email address.
                    // If the character right before our match is an '@', ignore it.
                    if (match.index > 0 && text[match.index - 1] === '@') {
                        continue;
                    }

                    let cleanUrl = match[0];
                    let suffix = '';
                    
                    // Strip trailing punctuation
                    if (/[.,;:)]$/.test(cleanUrl)) {
                        suffix = cleanUrl.slice(-1);
                        cleanUrl = cleanUrl.slice(0, -1);
                    }
                    
                    let href = cleanUrl;
                    if (!/^https?:\/\//i.test(href)) {
                        href = 'https://' + href;
                    }
                    extractedLinks.push(`<a href='${href}' target='_blank' rel='noopener noreferrer'>${cleanUrl}</a>`);
                }
            };

            // 1. Find all explicit <a> tags inside the cell
            const aTags = node.querySelectorAll('a');
            aTags.forEach(a => {
                let href = a.getAttribute('href') || '';
                let text = (a.textContent || '').trim();
                
                // Clean internal Google Docs/Sheets redirects
                if (href.startsWith('/document/') || href.startsWith('/spreadsheets/')) {
                    href = 'https://docs.google.com' + href;
                } else if (href && !/^(https?|mailto|tel|ftp|#)/i.test(href)) {
                    href = 'https://' + href;
                }

                if (href.includes('google.com/url?')) {
                    try {
                        const urlObj = new URL(href, 'https://dummy.com'); 
                        href = urlObj.searchParams.get('q') || urlObj.searchParams.get('url') || href;
                    } catch {}
                }

                if (href) {
                    extractedLinks.push(`<a href='${href}' target='_blank' rel='noopener noreferrer'>${text || href}</a>`);
                }
            });

            // 2. Clone the cell and DELETE the <a> tags we just processed
            // This prevents double-processing links that Google Sheets duplicates as text
            const clone = node.cloneNode(true);
            clone.querySelectorAll('a').forEach(a => a.remove());

            // 3. Scan the remaining text in the cell for plain-text URLs
            const remainingText = (clone.textContent || '').replace(/[\u200B-\u200D\uFEFF]/g, ' ');
            processTextForUrls(remainingText);

            // 4. If nothing was found, return empty
            if (extractedLinks.length === 0) return '';

            // 5. Deduplicate perfectly identical HTML strings to block clipboard glitches
            extractedLinks = [...new Set(extractedLinks)];

            // Wrap each unique link in a paragraph tag
            return extractedLinks.map(linkHTML => `<p>${linkHTML}</p>`).join('');
        },
        
        clearText() {
            this.quill.setText('');
            this._rawPastedTable = null;
            this.networks.forEach(net => this.networkData[net] = '<p>No data found.</p>');
        },

        // ADVANCED RICH-TEXT COPY: Uses your preferred Clipboard API method
        async copyData(network) {
            const htmlContent = this.networkData[network];
            if (!htmlContent) return;

            // Extract pure text for the fallback payload
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlContent;
            const textContent = tempDiv.innerText;

            try {
                // Creates exactly the payload you used in your old code
                const clipboardItem = new ClipboardItem({
                    'text/html': new Blob([htmlContent], { type: 'text/html' }),
                    'text/plain': new Blob([textContent], { type: 'text/plain' })
                });

                await navigator.clipboard.write([clipboardItem]);
            } catch (err) {
                console.warn('ClipboardItem API failed, falling back to execCommand:', err);
                
                // Fallback for older browsers or non-HTTPS connections
                tempDiv.style.position = 'fixed';
                tempDiv.style.pointerEvents = 'none';
                tempDiv.style.opacity = '0';
                document.body.appendChild(tempDiv);
                
                const selection = window.getSelection();
                const range = document.createRange();
                range.selectNodeContents(tempDiv);
                selection.removeAllRanges();
                selection.addRange(range);
                
                try {
                    document.execCommand('copy');
                } catch (fallbackErr) {
                    console.error('Fallback copy failed:', fallbackErr);
                }
                
                document.body.removeChild(tempDiv);
                selection.removeAllRanges();
            }
        },

        nextPane() {
            if (this.startIndex + 5 < this.networks.length) this.startIndex += 5;
        },

        prevPane() {
            if (this.startIndex - 5 >= 0) this.startIndex -= 5;
            else this.startIndex = 0;
        }
    }"
>

<main class="container">
    <div class="header-section">
        <h2 class="app-title">NS Excellence Extractor</h2>
    </div>

    <!-- AlpineJS Click Handlers -->
    <div class="button-container">
        <button class="buttons" @click="cleanText">Clean Up</button>
        <button class="buttons" @click="clearText">Clear</button>
    </div>

<!-- FULL SCREEN SLIDING PREVIEW PANE -->
<div class="preview-screen" :class="{ 'active': showPreviews }">
    <div class="preview-header">
        <h2 class="app-title" style="margin:0;">Search String Data</h2>
        <button class="buttons" @click="showPreviews = false" style="min-width: 100px;">&times; Close</button>
    </div>

    <div class="carousel full-screen-carousel">
        <!-- Previous Button (Disabled if at index 0) -->
        <button class="nav-btn" @click="prevPane" :disabled="startIndex === 0">⬅</button>
        
        <!-- Visible Panes Container -->
        <div class="panes-container full-height">
            <template x-for="network in networks.slice(startIndex, startIndex + 5)" :key="network">
                <div class="pane large-column">
                    
                    <!-- NEW INTERACTIVE HEADER COPY BUTTON -->
                    <div class="pane-title copy-btn" 
                         x-data="{ isHovered: false, isCopied: false }"
                         @mouseenter="isHovered = true"
                         @mouseleave="isHovered = false; isCopied = false"
                         @click="copyData(network); isCopied = true"
                         :class="{ 'hover-active': isHovered }">
                        <span x-text="isCopied ? 'Copied!' : (isHovered ? 'Copy' : network)"></span>
                    </div>
                    
                    <!-- Scrollable inner content for massive datasets -->
                    <div class="pane-content" x-html="networkData[network]"></div>
                </div>
            </template>
        </div>

        <!-- Next Button (Disabled if there are no more panes to show) -->
        <button class="nav-btn" @click="nextPane" :disabled="startIndex + 5 >= networks.length">➡</button>
    </div>
</div>

<script>
document.addEventListener("keydown", function(e) {
  // Block F12 and common shortcuts (Ctrl+Shift+I/J, Ctrl+U)
  if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
    e.preventDefault();
    return false;
  }
});

document.addEventListener("keydown", function(e) {

    e.preventDefault();
  }
});
// Optional: Disable right-click
document.addEventListener("contextmenu", e => e.preventDefault());
</script>

        subscribeKey: "sub-c-4eb236b2-cdf6-4249-a760-391c23a938dc",

        heartbeatInterval: 30
    });

    // 4. Join the specific channel
    pubnub.subscribe({
        channels: [MY_PAGE_ID],
        withPresence: true

    // 5. Cleanup when the user leaves

    window.onbeforeunload = function() {
        pubnub.unsubscribe({
            channels: [MY_PAGE_ID]
        });
    };
</script>
