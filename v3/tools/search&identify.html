<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NS Toolkits v3 | Socmed S&I</title>
    <link rel="icon" type="image/jpg" href="https://i.imgur.com/QWLMgK8.jpeg">
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --accent-gold: #f6c90e;
            --text-main: #e0e0e0;
            --text-dim: #b0b0b0;
            --border-color: #333;
            --danger: #ff4d4d;
            --success: #28a745;
            /* Merged Vars */
            --accent: #f6c90e;
            --nav-bg: rgba(20, 20, 20, 0.6);
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; 
            background: radial-gradient(circle at top, #1a1a1a 0%, #0b0b0b 60%);
            color: var(--text-main);
            display: flex;
            flex-direction: column; /* Changed to column for top nav */
            height: 100vh;
            overflow: hidden;
        }

        /* CANVAS BACKGROUND */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

/* =========================
   NAVBAR
========================= */
/* NAVBAR */
.navbar {
    width: 100%;
    background: rgba(20, 20, 20, 0.6);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
}

.nav-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.nav-left h1 { margin: 0; font-size: 20px; color: var(--accent); letter-spacing: 1px; }

.nav-menu {
    display: flex;
    gap: 28px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
}

.nav-menu a {
    color: #e6e6e6;
    text-decoration: none;
    font-size: 14px;
    font-weight: normal; /* Add this line */
    opacity: 0.8;
    transition: 0.3s;
}

.nav-menu a:hover { color: var(--accent); opacity: 1; }


        /* LAYOUT WRAPPER */
        .app-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 280px; 
            background-color: var(--card-bg);
            border-right: 1px solid var(--border-color);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex-shrink: 0;
        }

        .sidebar h2 {
            color: var(--accent-gold);
            font-size: 1.2rem;
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .sidebar p { font-size: 0.8rem; color: var(--text-dim); line-height: 1.5; }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            width: calc(100% - 280px);
        }

        .header-bar {
            padding: 15px 25px;
            background: rgba(30, 30, 30, 0.5);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.75rem; font-weight: bold; color: var(--accent-gold); text-transform: uppercase; }

        .btn {
            cursor: pointer;
            border: none;
            border-radius: 6px;
            padding: 12px 20px;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-add { background: var(--accent-gold); color: black; width: 100%; }
        .btn-add:hover { background: #e5bb0d; transform: translateY(-1px); }

        .btn-open-all { background: #333; color: var(--accent-gold); font-size: 10px; padding: 4px 8px; border: 1px solid var(--accent-gold); white-space: nowrap;}

        .btn-delete { background: transparent; color: var(--danger); padding: 5px; opacity: 0.6; }
        .btn-delete:hover { opacity: 1; }

        .table-container {
            flex-grow: 1;
            overflow: auto;
            padding: 10px;
        }

        table { 
            width: 100%; 
            border-collapse: separate; 
            border-spacing: 0 8px; 
            table-layout: fixed; 
        }
        
        th { 
            text-align: left; 
            padding: 10px 5px; 
            color: var(--text-dim); 
            font-size: 9px; 
            text-transform: uppercase;
            position: sticky; 
            top: 0;
            background: #0b0b0b;
            z-index: 10;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        td { 
            background: var(--card-bg); 
            padding: 8px 5px; 
            font-size: 11px;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }

        th:nth-child(1), td:nth-child(1) { width: 40px; } 
        th:nth-child(2), td:nth-child(2) { width: 150px; text-align: left; } 
        th:nth-child(3), td:nth-child(3) { width: 80px; }

        td:first-child { border-left: 1px solid var(--border-color); border-radius: 8px 0 0 8px; }
        td:last-child { border-right: 1px solid var(--border-color); border-radius: 0 8px 8px 0; }

        tr:hover td { background: #252525; }

        .name-input { 
            background: transparent; 
            border: none; 
            color: var(--accent-gold); 
            font-weight: 700; 
            width: 100%; 
            font-size: 13px;
        }
        .name-input:focus { outline: none; border-bottom: 1px solid var(--accent-gold); }

        a { color: var(--accent-gold); text-decoration: none; font-size: 10px; font-weight: bold; }
        a:hover { text-decoration: underline; }

        .hidden-link { visibility: hidden; }

        /* LOADER STYLING */
        #loader-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #080808; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .gold-ring { width: 50px; height: 50px; border: 1px solid rgba(212, 175, 55, 0.2); border-top: 2px solid #d4af37; border-radius: 50%; animation: spin 1s infinite cubic-bezier(0.6, 0.2, 0.4, 0.8); }
        .loader-text { margin-top: 30px; color: #d4af37; font-size: 9px; letter-spacing: 8px; font-weight: 300; opacity: 0.7; }
        .progress-container { margin-top: 20px; width: 150px; height: 1px; background: rgba(255, 255, 255, 0.05); }
        .progress-bar { width: 0%; height: 100%; background: #d4af37; animation: grow 3.5s forwards linear; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes grow { to { width: 100%; } }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="loading">

    <div id="loader-wrapper">
        <div class="gold-ring"></div>
        <div class="loader-text">ESTABLISHING CONNECTION</div>
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </div>

    <canvas id="bg"></canvas>

    <div class="navbar">
        <div class="nav-inner">
            <div class="nav-left"><h1>NS Toolkits v3</h1></div>
            <div class="nav-menu">
                <a href="https://nstoolkits.site/v3/">Home</a>
                <a href="about.html">About Us</a>
                <a href="https://nstoolkits.site/">Version 2</a>
            </div>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <h2>Socmed S&I</h2>
            <p>Advanced Social Intelligence Gathering. v3.0</p>
            
            <div class="input-group">
                <label>Management</label>
                <button class="btn btn-add" onclick="addRow()">+ Add More</button>
            </div>

            <div style="margin-top: auto; font-size: 11px; color: var(--text-dim);">
                Made by Darel Miranda
            </div>
        </aside>

        <main class="main-content">
            <header class="header-bar">
                <div style="font-size: 11px; font-weight: bold; color: var(--text-dim);">S&I DASHBOARD // ACTIVE SESSION</div>
                <div id="rowCount" style="font-size: 11px; color: var(--accent-gold);">0 TARGETS LOADED</div>
            </header>

            <div class="table-container">
                <table id="siTable">
                    <thead>
                        <tr>
                            <th>Del</th>
                            <th>POI Name</th>
                            <th>Bulk</th>
						<th title="Facebook">FB</th>
						<th title="Picuki (IG)">PIC</th>
						<th title="Twitter">TW</th>
						<th title="YouTube">YT</th>
						<th title="LinkedIn">LI</th>
						<th title="TikTok">TK</th>
						<th title="Pinterest">PIN</th>
						<th title="Strava">STR</th>
						<th title="Tumblr">TUM</th>
						<th title="Google">GO</th>
						<th title="Poshmark">POS</th>
						<th title="Classmates">CLA</th>
						<th title="Etsy">ETS</th>
						<th title="SoundCloud">SC</th>
						<th title="Quora">QU</th>
						<th title="Mugshots">MUG</th>
						<th title="VSCO">VSC</th>
						<th title="MySpace">MY</th>
						<th title="Vimeo">VIM</th>
						<th title="GoFundMe">GFM</th>
						<th title="Venmo">VEN</th>
						<th title="Spotify">SPO</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // Loader timeout
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader-wrapper').style.display = 'none';
                document.body.classList.remove('loading');
            }, 3500);
        });

         const searchTemplates = [
            "https://www.facebook.com/search/people/?q=",
            "https://www.picuki.com/search/",
            "https://www.x.com/search?q=",
            "https://www.youtube.com/results?search_query=",
            "https://www.linkedin.com/search/results/people/?keywords=",
            "https://www.tiktok.com/search/user?q=",
            "https://www.pinterest.com/search/users/?q=",
            "https://www.strava.com/athletes/search?text=",
			"https://www.tumblr.com/search/",
			"https://www.google.com/search?q=",
            "https://www.poshmark.com/search?type=people&query=",
            "https://www.classmates.com/siteui/search/results?q=",
            "https://www.etsy.com/search_results_people.php?search_query=",
            "https://wwww.soundcloud.com/search/people?q=",
            "https://www.quora.com/search?type=profile&q=",
            "https://www.mugshots.com/search.html?q=",
            "https://vsco.co/search/people/",
            "https://www.myspace.com/search/people?q=",
            "https://www.vimeo.com/search?q=",
            "https://www.gofundme.com/s?q="
        ];

        function saveToLocalStorage() {
            const names = Array.from(document.querySelectorAll('.name-input')).map(input => input.value);
            localStorage.setItem('ns_tool_data', JSON.stringify(names));
        }

        function loadFromLocalStorage() {
            const savedData = localStorage.getItem('ns_tool_data');
            if (savedData) {
                const names = JSON.parse(savedData);
                if (names.length === 0) {
                    addRow();
                } else {
                    names.forEach(name => {
                        const row = addRow(false);
                        const input = row.querySelector('.name-input');
                        input.value = name;
                        updateLinks(input);
                    });
                }
            } else {
                addRow();
            }
        }

        function addRow(shouldSave = true) {
            const tbody = document.getElementById('tableBody');
            const row = document.createElement('tr');
            
            let cellsHTML = `
                <td><button class="btn btn-delete" onclick="removeRow(this)">✕</button></td>
                <td><input type="text" class="name-input" placeholder="Type Name..." oninput="updateLinks(this)"></td>
                <td><button class="btn btn-open-all" onclick="openAllInRow(this)" style="display:none">OPEN</button></td>
            `;

            for (let i = 0; i < 20; i++) {
                cellsHTML += `<td><a href="#" target="_blank" class="hidden-link">GO</a></td>`;
            }

            cellsHTML += `<td><a href="#" target="_blank" class="hidden-link venmo-link">GO</a></td>`;
            cellsHTML += `<td><a href="#" target="_blank" class="hidden-link spotify-link">GO</a></td>`;

            row.innerHTML = cellsHTML;
            tbody.appendChild(row);
            updateCount();
            if(shouldSave) saveToLocalStorage();
            return row;
        }

        function removeRow(btn) {
            btn.closest('tr').remove();
            updateCount();
            saveToLocalStorage();
        }

        function updateCount() {
            const count = document.getElementById('tableBody').children.length;
            document.getElementById('rowCount').innerText = `${count} TARGETS LOADED`;
        }

        function updateLinks(inputElement) {
            const name = inputElement.value.trim();
            const row = inputElement.closest('tr');
            const links = row.querySelectorAll('a');
            const bulkBtn = row.querySelector('.btn-open-all');
            
            if (name.length > 0) {
                bulkBtn.style.display = "block";
                const encodedName = encodeURIComponent(name);
                const plusName = name.replace(/\s+/g, '+'); 
                
                for (let i = 0; i < 20; i++) {
                    if (searchTemplates[i].includes("vimeo.com")) {
                        links[i].href = searchTemplates[i] + plusName + "&type=people";
                    } else {
                        links[i].href = searchTemplates[i] + encodedName;
                    }
                    links[i].classList.remove('hidden-link');
                }

                const venmoLink = row.querySelector('.venmo-link');
                venmoLink.href = `https://www.venmo.com/u/${name.replace(/\s+/g, '-')}`;
                venmoLink.classList.remove('hidden-link');

                const spotifyLink = row.querySelector('.spotify-link');
                spotifyLink.href = `https://www.google.com/search?q=site:open.spotify.com/user "${encodedName}"`;
                spotifyLink.classList.remove('hidden-link');

            } else {
                bulkBtn.style.display = "none";
                links.forEach(link => link.classList.add('hidden-link'));
            }
            saveToLocalStorage();
        }

        function openAllInRow(button) {
            const row = button.closest('tr');
            row.querySelectorAll('a').forEach(link => {
                if (link.href && link.href.includes('http')) window.open(link.href, '_blank');
            });
        }

        window.onload = loadFromLocalStorage;
    </script>
</body>
</html>
