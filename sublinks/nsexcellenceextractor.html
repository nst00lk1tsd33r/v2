<!DOCTYPE html>
<html lang="en">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NS Excellence Extractor</title>
<link rel="icon" type="image/jpg" href="https://i.imgur.com/7xDufQI.jpeg">
<link rel="stylesheet" href="../styles/nsss1.css">
<link rel="stylesheet" href="../styles/templatewriterstyle12.css">
<style>
</style>
</head>

<header>
    <h1>NS Toolkits</h1>
    <nav>
<a href="https://nstoolkits.site/main.html">Home</a>
    </nav>
    <button id="modeToggle">🌙 Dark Mode</button>
</header>


<main>
    <h2 class="app-title">NS Excellence Extractor</h2>
    <p style="text-align:center; color:#7f8c8d; font-size:14px; margin-bottom:20px; max-width: 700px;">
        Your search query cleaner. It does everything for you. | A tool may ease the work, but it cannot replace the craftsman.
    </p>

    <div class="button-container">
        <button class="buttons" id="cleanBtn">Clean Up</button>
        <button class="buttons" id="copyBtn">Copy</button>
        <button class="buttons" id="clearBtn">Clear</button>
    </div>

    <div class="editor-container">
        <div class="main-wrapper">
            <section class="input-section">
                <div class="inputarea" id="text-input" contenteditable="true" placeholder="Paste text here..."></div>
            </section>

            <section class="output-section">
                <div class="inputarea" id="output-view"></div>
            </section>
        </div>
    </div>
</main>

<footer id="footer">
    &copy; 2026 NS Tool Kits | Made by Morvan Hsu and Darel Miranda
</footer>

<script src="../scripts/excellenceextractorscripts.js"></script>
<script>
    // Footer appear on scroll down
    let lastScroll = 0;
    const footer = document.getElementById('footer');

    window.addEventListener('scroll', () => {
        const currentScroll = window.pageYOffset;
        if (currentScroll > lastScroll) {
            footer.style.bottom = '0';
        } else {
            footer.style.bottom = '-100px';
        }
        lastScroll = currentScroll <= 0 ? 0 : currentScroll;
    });

// Dark/Light Mode Toggle (WITH PERSISTENCE)
const modeBtn = document.getElementById('modeToggle');

// Load saved mode on refresh
if (localStorage.getItem('ns_theme') === 'dark') {
    document.body.classList.add('dark-mode');
    modeBtn.textContent = '☀️ Light Mode';
} else {
    modeBtn.textContent = '🌙 Dark Mode';
}

modeBtn.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');

    if (document.body.classList.contains('dark-mode')) {
        modeBtn.textContent = '☀️ Light Mode';
        localStorage.setItem('ns_theme', 'dark');
    } else {
        modeBtn.textContent = '🌙 Dark Mode';
        localStorage.setItem('ns_theme', 'light');
    }
});
</script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
<script>
document.addEventListener("keydown", function(e) {
  // Block F12 and common shortcuts (Ctrl+Shift+I/J, Ctrl+U)
  if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
    e.preventDefault();
    return false;
  }
});

document.addEventListener("keydown", function(e) {
  if (e.ctrlKey && e.shiftKey && e.key === "C") {
    e.preventDefault();
  }
});
// Optional: Disable right-click
document.addEventListener("contextmenu", e => e.preventDefault());
</script>
</body>
</html>
